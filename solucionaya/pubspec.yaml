name: solucionaya
description: "SolucionaYa — Conecta clientes con trabajadores de servicios del hogar."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.2

# ─────────────────────────────────────────────────────────────
# DEPENDENCIAS DE PRODUCCIÓN
# ─────────────────────────────────────────────────────────────
dependencies:
  flutter:
    sdk: flutter

  # ── Firebase ─────────────────────────────────────────────
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2
  firebase_messaging: ^15.1.3
  firebase_analytics: ^11.3.3
  firebase_crashlytics: ^4.1.3
  firebase_app_check: ^0.3.1+3

  # ── Estado (Riverpod) ─────────────────────────────────────
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # ── Navegación ────────────────────────────────────────────
  go_router: ^14.3.0

  # ── UX / Animaciones ─────────────────────────────────────
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  lottie: ^3.1.0
  cached_network_image: ^3.4.1

  # ── Chat ─────────────────────────────────────────────────
  flutter_chat_ui: ^2.0.0
  flutter_chat_types: ^3.6.2
  image_picker: ^1.1.2

  # ── Mapas y Ubicación ─────────────────────────────────────
  google_maps_flutter: ^2.9.0
  geolocator: ^13.0.1
  geocoding: ^3.0.0

  # ── Utilidades ────────────────────────────────────────────
  intl: ^0.19.0
  url_launcher: ^6.3.1
  share_plus: ^10.0.0
  package_info_plus: ^8.1.0
  connectivity_plus: ^6.0.6
  uuid: ^4.5.1
  image: ^4.2.0
  flutter_image_compress: ^2.3.0
  path_provider: ^2.1.4
  shared_preferences: ^2.3.3

# ─────────────────────────────────────────────────────────────
# DEPENDENCIAS DE DESARROLLO
# ─────────────────────────────────────────────────────────────
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.3
  build_runner: ^2.4.13
  mocktail: ^1.0.4
  fake_cloud_firestore: ^3.0.2

# ─────────────────────────────────────────────────────────────
# FLUTTER ASSETS & FONTS
# ─────────────────────────────────────────────────────────────
flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
    - assets/fonts/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter_24pt-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter_28pt-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter_18pt-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter_28pt-Bold.ttf
          weight: 700
